name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: What happened?
      description: Include reproduction steps, expected behavior, and actual behavior.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Environment
      description: Browser, runtime version, and relevant logs.

