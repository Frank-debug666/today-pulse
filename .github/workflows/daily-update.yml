name: Daily technology briefing

on:
  schedule:
    # Check once per hour. The generator exits early after today's briefing exists.
    # Using an off-hour minute reduces GitHub Actions schedule congestion.
    - cron: "23 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: daily-technology-briefing
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate daily briefing
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_API: ${{ secrets.AI_API }}
          ARK_MODEL_ID: ${{ secrets.ARK_MODEL_ID }}
          ARK_ENDPOINT_ID: ${{ secrets.ARK_ENDPOINT_ID }}
          ARK_BASE_URL: ${{ secrets.ARK_BASE_URL }}
        run: npm run update:daily

      - name: Check daily changes
        id: daily_changes
        run: |
          if git diff --quiet -- public/daily.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate market pulse
        if: github.event_name == 'workflow_dispatch' || steps.daily_changes.outputs.changed == 'true'
        run: npm run update:market

      - name: Validate and build
        run: |
          npm run validate:daily
          npm run build


      - name: Summarize generated content
        run: |
          node -e "const d=require('./public/daily.json'); const g=d.generation||{}; require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, '## Daily briefing result\n\n- Date: '+d.dateLabel+'\n- News: '+d.globalNews.length+'\n- GitHub repos: '+d.githubRepos.length+'\n- News source: '+(g.newsSource||'unknown')+'\n- News note: '+(g.newsError||'none')+'\n- Learning source: '+(g.learningSource||'unknown')+'\n- Learning note: '+(g.learningError||'none')+'\n')"
          node -e "const m=require('./public/market.json'); require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, '- Market updated: '+(m.generatedAt||'unknown')+'\n- Market source: '+(m.source||'unknown')+'\n')"

      - name: Commit updated briefing
        run: |
          git config user.name "today-pulse-bot"
          git config user.email "today-pulse-bot@users.noreply.github.com"
          git add public/daily.json public/market.json
          git diff --cached --quiet && exit 0
          git commit -m "Update daily technology briefing"
          git pull --rebase origin main
          git push
